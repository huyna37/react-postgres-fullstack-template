# Jira Agent — chạy app + PostgreSQL trong Docker
#
# Cần file .env ở thư mục gốc (cho JIRA_*, GEMINI_*, TELEGRAM_*, v.v.).
# Các biến DB_* trong .env sẽ bị ghi đè bên dưới để trỏ vào container db.
#
# Chạy: docker compose up --build
# Truy cập: http://localhost:5000

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-jira_agent}
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-jira_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
