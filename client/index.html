<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <title>AI Jira Generator | Premium BA Tool</title>
    <script>
      (function () {
        var k = 'jira-genius-theme';
        var userSet = localStorage.getItem('jira-genius-theme-user-set') === '1';
        var t = userSet ? localStorage.getItem(k) : localStorage.getItem('jira-genius-theme-default');
        if (!userSet && t !== 'light' && t !== 'dark') {
          t = localStorage.getItem(k);
        }
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
