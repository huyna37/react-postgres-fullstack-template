<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Flag pole -->
  <line x1="20" y1="14" x2="20" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Flag body -->
  <path d="M20 15 L46 22 L20 30 Z" fill="white" opacity="0.95"/>
  <!-- Small checkmark on flag -->
  <polyline points="27,20 30,24 37,17" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
